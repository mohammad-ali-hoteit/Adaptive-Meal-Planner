<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Adaptive Planner - Onboarding - Your Height</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#93000a",

                        "surface-variant": "#ebe1d1",
                        "on-tertiary-container": "#005e70",
                        "outline": "#807660",
                        "on-primary": "#ffffff",
                        "primary-container": "#f5c518",
                        "on-primary-container": "#695200",
                        "background": "#fff8f1",
                        "surface-dim": "#e2d9c8",
                        "primary-fixed-dim": "#f0c110",
                        "secondary-fixed-dim": "#d2bbff",
                        "tertiary-container": "#49dbff",
                        "outline-variant": "#d1c5ac",
                        "on-secondary-fixed": "#25005a",
                        "secondary": "#712ae2",
                        "tertiary-fixed-dim": "#42d7fb",
                        "inverse-primary": "#f0c110",
                        "surface-tint": "#745b00",
                        "on-secondary-fixed-variant": "#5a00c6",
                        "on-background": "#1f1b11",
                        "surface-bright": "#fff8f1",
                        "on-tertiary-fixed": "#001f27",

                        "surface-container-lowest": "#ffffff",

                        "on-primary-fixed": "#241a00",

                        "on-surface": "#1f1b11",
                        "secondary-container": "#8a4cfc",
                        "inverse-on-surface": "#f9f0de",
                        "inverse-surface": "#353025",
                        "surface-container-highest": "#ebe1d1",
                        "on-primary-fixed-variant": "#584400",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#f6eddc",

                    "borderRadius": {

                    "spacing": {
                        "topbar_height": "72px",
                        "sidebar_collapsed": "72px",
                        "xl": "32px",
                        "base": "8px",
                        "xs": "4px",
                        "sidebar_expanded": "240px",
                        "md": "16px",
                        "lg": "24px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "title-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-auth-cta": ["Inter"],
                        "caption": ["Inter"],

                    "fontSize": {

                        "headline-md": ["20px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "label-auth-cta": ["15px", { "lineHeight": "1", "fontWeight": "800" }],
                        "caption": ["11px", { "lineHeight": "1", "fontWeight": "400" }],

                        "body-md": ["13px", { "lineHeight": "1.5", "fontWeight": "400" }]

                }
            }
        }

<style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1.5px solid #EAEDF3;
        }
        .kinetic-gold-btn {
            background-color: #f5c518;
            color: #695200;
            transition: all 0.2s ease;
        }
        .kinetic-gold-btn:hover {
            background-color: #D4A800;
            transform: translateY(-1px);
        }
        .input-glow:focus-within {
            border-color: #745b00;
            box-shadow: 0 0 0 3px rgba(116, 91, 0, 0.2);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-md relative overflow-hidden">
<!-- Decorative background elements for that "Structured Energy" feel -->
<div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-primary-container rounded-full blur-[100px] opacity-20 pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[500px] h-[500px] bg-secondary-container rounded-full blur-[120px] opacity-10 pointer-events-none"></div>
<main class="w-full max-w-[900px] glass-panel rounded-xl shadow-[0_8px_32px_rgba(31,27,17,0.05)] overflow-hidden flex flex-col md:flex-row relative z-10 animate-[fadeIn_0.55s_ease-out,slideUp_0.55s_ease-out]">
<!-- Left Side: Illustration Area -->
<div class="w-full md:w-1/2 bg-surface-container-low p-xl flex items-center justify-center border-b md:border-b-0 md:border-r border-outline-variant relative">
<div class="w-full max-w-[300px] aspect-square relative">
<img alt="Silhouette indicating height measurement" class="w-full h-full object-contain mix-blend-multiply opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDmqEdecDH6kG8EY1IuZ1iWgqq7A_PlTH_mcpnoWqGLd87Ajf_eO8hSr3ejUkRJzBHZunOYwggJiet6UuzG7XV605wde_nSQwvtFwsWwZjjjaNyGuG4SC_o2-2LCofsQNln6gXmwAsemZM3LOrqsKeORXCR06h-Lbv9RmnWm5cgtYFRNO7rCaa79ce1kVAWFmJ7vCYxKENWXkK-fMfmX8fVe0lqQjKoYe_gMEwL78LBtxXYks-rqzKAVg"/>
<!-- Dynamic Height Indicator Mockup -->
<div class="absolute right-[10%] top-[20%] bottom-[15%] w-[2px] bg-primary flex flex-col items-center justify-between py-2">
<span class="material-symbols-outlined text-primary text-xs -mt-3">arrow_drop_up</span>
<div class="h-full border-r-[2px] border-dashed border-primary/50 absolute top-0 left-0"></div>
<span class="material-symbols-outlined text-primary text-xs -mb-3">arrow_drop_down</span>
</div>
</div>
</div>
<!-- Right Side: Content & Input -->
<div class="w-full md:w-1/2 p-xl flex flex-col justify-between min-h-[500px]">
<!-- Progress Header -->
<div class="mb-lg">
<div class="flex justify-between items-center mb-sm">
<span class="font-label-button text-label-button text-on-surface-variant">Step 4 of 8</span>
<button aria-label="Go back" class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<div class="h-2 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-1/2 rounded-full transition-all duration-500 ease-out"></div>
</div>
</div>
<!-- Main Input Area -->
<div class="flex-grow flex flex-col justify-center">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-sm">What is your height?</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl">This helps us calculate your daily caloric needs accurately.</p>
<div class="relative w-full max-w-[240px] mx-auto md:mx-0">
<div class="flex items-center bg-[#F8F9FF] border-[1.8px] border-[#E2E8F0] rounded-lg p-md input-glow transition-all duration-200">
<input aria-label="Height in centimeters" class="bg-transparent border-none outline-none w-full text-center font-display-stat text-display-stat text-on-surface focus:ring-0" id="heightInput" placeholder="175" type="number"/>
<span class="font-title-sm text-title-sm text-on-surface-variant ml-sm">cm</span>
</div>
</div>
<!-- Toggle (Optional detail for professional feel) -->
<div class="flex justify-center md:justify-start mt-lg">
<div class="bg-surface-container-high p-1 rounded-lg flex inline-flex">
<button class="px-md py-sm bg-surface rounded shadow-sm font-label-button text-label-button text-on-surface">cm</button>
<button class="px-md py-sm rounded font-label-button text-label-button text-on-surface-variant hover:text-on-surface">ft/in</button>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="mt-xl pt-lg border-t border-outline-variant flex justify-end">
<button class="kinetic-gold-btn px-xl py-md rounded-lg font-label-button text-label-button flex items-center gap-2">
                    Continue
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
</main>
<style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(20px); }
            to { transform: translateY(0); }
        }
        
        /* Remove arrows from number input */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</body></html>
