<style>
        .fade-in-up {
            animation: fadeInUp 0.55s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .gender-card {
            transition: all 0.2s ease;
        }
        .gender-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
        }
        .gender-card.selected {
            border-color: #745b00; /* primary */
            background-color: #fff8f1; /* surface */
            box-shadow: 0 0 0 2px #745b00;
        }
    </style>

<body class="bg-background text-on-background min-h-screen flex flex-col font-sans">
<!-- Topbar (Minimal for Onboarding) -->
<header class="w-full flex items-center justify-between p-lg z-30 relative bg-transparent">
<button class="flex items-center text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined mr-sm">arrow_back</span>
<span class="font-label-button text-label-button">Back</span>
</button>
<div class="font-headline-md text-headline-md font-bold text-primary">Adaptive Meal Planner</div>
<div class="w-[60px]"></div> <!-- Spacer to balance back button -->
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-center p-md relative z-10">
<div class="w-full max-w-[600px] fade-in-up">
<!-- Progress Section -->
<div class="mb-xl text-center">
<p class="font-caption text-caption text-on-surface-variant mb-sm uppercase tracking-wider">Step 2 of 8</p>
<div class="w-full bg-surface-variant h-2 rounded-full overflow-hidden">
<div class="bg-primary h-full rounded-full w-2/8 transition-all duration-500" style="width: 25%"></div>
</div>
</div>
<!-- Header -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-on-background mb-sm">What is your gender?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">We use this to calculate your daily nutritional needs.</p>
</div>
<!-- Selection Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-lg mb-xl">
<!-- Male Card -->
<div class="gender-card bg-surface border-[1.5px] border-outline-variant rounded-[16px] p-lg cursor-pointer flex flex-col items-center justify-center aspect-square" onclick="selectGender(this, 'male')">
<div class="w-32 h-32 mb-lg flex items-center justify-center bg-surface-container-low rounded-full">
<img alt="Male silhouette icon" class="w-24 h-24 object-contain opacity-80" data-alt="A minimalist, elegant line-art icon of a male figure with a subtle gold tint, set against a very light warm background. The style is modern, energetic yet structured, fitting a premium corporate dashboard aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCaXd0LPrEZ0CTs40S9NmTbolowzrZ6a_4dcVF3Adc2QRwY_fpauHdTgmG3yGdHkIuRAk8a0ZB_tv3R7Q0yX52t7Ndt7f1xh-YbaaFTS-jVpJ9NhBWIS9IDa6Ufu7IoZLlqde537j-ypCcC3mw-4dLrG1l3IXdj_RF7STCUArmOLmcArf_RmusmkRoZP8bjWt_K09_MxNUXPqLD0tiw9KmbC0x-CechABYmbW51M14Y9vypzKjoosQ9gw"/>
</div>
<span class="font-title-sm text-title-sm text-on-surface">Male</span>
</div>
<!-- Female Card -->
<div class="gender-card bg-surface border-[1.5px] border-outline-variant rounded-[16px] p-lg cursor-pointer flex flex-col items-center justify-center aspect-square" onclick="selectGender(this, 'female')">
<div class="w-32 h-32 mb-lg flex items-center justify-center bg-surface-container-low rounded-full">
<img alt="Female silhouette icon" class="w-24 h-24 object-contain opacity-80" data-alt="A minimalist, elegant line-art icon of a female figure in a meditation pose with a subtle gold tint, set against a very light warm background. The style is modern, energetic yet structured, fitting a premium corporate dashboard aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAtzPflP0iGUMPM7hgDgM_tBpJxCeIeppS4Yk-QpMwJ9SdFehhQMDdv_wxq5qBL4-HBvZlzwyXdbAlfEHJczq99FDOAP4lUc3lA8bRkbNY1J_xo2K1Z4K8Wbo1ftlhL-g7qJvPoGGRuIqnP6P6eVqWgGNqfoDAoPMIbeTKSK-RjQrJS5m1Hl_Ly_9SMDCn-KpwqYvpCvY0gC7_fvw_K_XCHXDjMaltuqhhB8bb6AGC_Fy50nY3-IZqXcQ"/>

<span class="font-title-sm text-title-sm text-on-surface">Female</span>
</div>
</div>
<!-- Action Area -->
<div class="flex justify-center mt-xl">
<button class="bg-primary text-on-primary font-label-button text-label-button py-md px-xl rounded-lg hover:bg-[#D4A800] hover:-translate-y-[1px] transition-all duration-200 shadow-sm w-full sm:w-auto min-w-[200px] opacity-50 cursor-not-allowed" disabled="" id="continueBtn">
                    Continue
                </button>
</div>
</div>
</main>
<script>
        function selectGender(element, gender) {
            // Remove selected class from all cards
            document.querySelectorAll('.gender-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // Add selected class to clicked card
            element.classList.add('selected');
            
            // Enable continue button
            const btn = document.getElementById('continueBtn');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
            
            // Optional: Store selection
            console.log('Selected gender:', gender);
        }
    </script>
