<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--tw-colors-surface);
            color: var(--tw-colors-on-surface);
            overflow-x: hidden;
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Ambient Background Blobs Animation */
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.5; }
        }
        .blob-bg {
            animation: pulse-slow 8s infinite ease-in-out;
        }

        /* Ring Animation */
        @keyframes fill-ring {
            from { stroke-dasharray: 0 100; }
            to { stroke-dasharray: 18.5 100; }
        }
        .animate-ring {
            animation: fill-ring 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 0.3s;
            stroke-dasharray: 0 100; /* Initial state */
        }

        /* Entrance Animation */
        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.55s ease-out forwards;
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
    </style>

<body class="bg-surface min-h-screen flex flex-col items-center justify-center relative selection:bg-primary-container selection:text-on-primary-container">
<!-- Ambient Background Decorations for "Structured Energy" -->
<div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] bg-primary-container/20 rounded-full blur-[100px] blob-bg pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-secondary/10 rounded-full blur-[80px] blob-bg pointer-events-none" style="animation-delay: -4s;"></div>
<!-- Main Content Container -->
<main class="w-full max-w-md px-md z-10 relative">
<!-- Onboarding Progress Header -->
<div class="mb-lg fade-in-up">
<div class="flex justify-between items-end mb-sm">
<span class="font-label-nav text-label-nav text-on-surface-variant uppercase tracking-wider">Your Result</span>
<span class="font-caption text-caption text-on-surface-variant font-medium">Step 6 of 8</span>
</div>
<!-- Progress Bar Track -->
<div class="h-1.5 w-full bg-surface-variant rounded-full overflow-hidden">
<!-- Progress Fill (75% for Step 6/8) -->
<div class="h-full bg-primary-container rounded-full transition-all duration-700 ease-out" style="width: 75%;"></div>
</div>
</div>
<!-- Result Card (Glassmorphism inspired) -->
<div class="bg-surface-container-lowest/80 backdrop-blur-xl border-1.5 border-outline-variant rounded-xl p-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] text-center flex flex-col items-center fade-in-up delay-100 relative overflow-hidden">
<!-- Subtle internal glow -->
<div class="absolute inset-0 bg-gradient-to-b from-primary-container/5 to-transparent pointer-events-none"></div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs relative z-10">Analysis Complete</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl max-w-[280px] relative z-10">Based on your metabolic profile, here is your calculated baseline.</p>
<!-- Gauge Visual Container -->
<div class="relative w-64 h-64 mb-lg fade-in-up delay-200">
<!-- SVG Ring -->
<svg class="w-full h-full drop-shadow-sm transform -rotate-90" viewbox="0 0 36 36">
<!-- Background Track -->
<path class="text-surface-variant" d="M18 2.0845
                          a 15.9155 15.9155 0 0 1 0 31.831
                          a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="2.5"></path>
<!-- Value Fill (18.5%) -->
<path class="text-primary-container animate-ring drop-shadow-[0_2px_8px_rgba(245,197,24,0.4)]" d="M18 2.0845
                          a 15.9155 15.9155 0 0 1 0 31.831
                          a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2.5"></path>
</svg>
<!-- Inner Content (Centered in Ring) -->
<div class="absolute inset-0 flex flex-col items-center justify-center rounded-full m-4 bg-surface-container-lowest shadow-[inset_0_2px_10px_rgba(0,0,0,0.02)] border border-surface-variant/50">
<span class="font-label-nav text-label-nav text-on-surface-variant mb-1">Body Fat</span>
<div class="flex items-baseline gap-1">
<span class="font-display-stat text-display-stat text-primary tracking-tight">18.5</span>
<span class="font-title-sm text-title-sm text-primary">%</span>
</div>
<!-- Category Badge -->
<div class="mt-3 px-3 py-1 rounded-full bg-secondary-fixed/30 border border-secondary/20 flex items-center gap-1.5">
<span class="w-2 h-2 rounded-full bg-secondary"></span>
<span class="font-label-nav text-label-nav text-on-secondary-fixed-variant">Normal</span>
</div>
</div>
</div>
<!-- Contextual Note -->
<div class="flex items-start gap-2 bg-surface-container p-md rounded-lg w-full text-left mb-lg fade-in-up delay-300">
<span class="material-symbols-outlined text-primary text-[20px] mt-0.5" data-icon="info" data-weight="fill" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="font-body-md text-body-md text-on-surface-variant">Your result falls within the optimal health range for your demographic profile. We'll use this to calibrate your weekly plan.</p>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary hover:bg-[#D4A800] hover:-translate-y-[1px] text-on-primary font-label-button text-label-button py-md rounded-lg shadow-md transition-all duration-200 flex items-center justify-center gap-2 fade-in-up delay-300 group">
                Continue to Meal Preferences

</button>
