<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriClock Pro — Smart Meal Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3e;
    --accent: #7c6aff;
    --accent2: #ff6a8a;
    --accent3: #6affcc;
    --text: #e8e8f0;
    --text-dim: #7070a0;
    --warn: #ffb86a;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,106,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,106,138,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 50px;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.8rem;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #7c6aff, #ff6a8a, #6affcc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--text-dim);
    margin-top: 8px;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }

  .step-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .step-card:hover { border-color: rgba(124,106,255,0.4); }

  .step-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .step-card:hover::before { opacity: 1; }

  .step-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .step-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 20px;
  }

  .form-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 100px;
  }

  label {
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  input[type="number"], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    padding: 10px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
  }

  input[type="number"]:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,255,0.15);
  }

  select option { background: var(--surface2); }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-add {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
  }

  .btn-add:hover {
    background: rgba(124,106,255,0.12);
    transform: translateY(-1px);
  }

  .btn-remove {
    background: transparent;
    border: 1px solid rgba(255,106,138,0.4);
    color: var(--accent2);
    padding: 10px 14px;
  }

  .btn-remove:hover { background: rgba(255,106,138,0.1); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #9b6aff);
    color: #fff;
    padding: 14px 36px;
    font-size: 0.95rem;
    box-shadow: 0 4px 20px rgba(124,106,255,0.35);
    width: 100%;
    margin-top: 8px;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(124,106,255,0.5);
  }

  .btn-primary:active { transform: translateY(0); }

  .busy-interval {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-wrap: wrap;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .time-sep {
    color: var(--text-dim);
    font-size: 0.85rem;
    padding-bottom: 10px;
    flex-shrink: 0;
  }

  #results {
    display: none;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }

  .result-section h3 {
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-section h3 span {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .timeline-wrapper {
    margin-top: 20px;
  }

  .timeline-track {
    position: relative;
    height: 32px;
    background: var(--surface2);
    border-radius: 8px;
    overflow: visible;
    margin-bottom: 0;
    border: 1px solid var(--border);
  }

  .tl-seg {
    position: absolute;
    top: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.62rem;
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    white-space: nowrap;
    transition: filter 0.2s;
    cursor: default;
  }

  .tl-seg:hover { filter: brightness(1.25); }

  .tl-seg-free {
    background: rgba(106,255,204,0.13);
    border-right: 1px solid rgba(106,255,204,0.2);
    color: var(--accent3);
  }

  .tl-seg-busy {
    background: rgba(255,106,138,0.22);
    border-right: 1px solid rgba(255,106,138,0.3);
    color: var(--accent2);
  }

  .tl-meal-pin {
    position: absolute;
    top: 0;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
    pointer-events: none;
  }

  .tl-meal-pin .pin-line {
    width: 2px;
    height: 32px;
  }

  .tl-meal-pin .pin-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
    border: 2px solid var(--bg);
  }

  .tl-meal-pin .pin-label {
    font-size: 0.6rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 4px;
    white-space: nowrap;
    text-align: center;
  }

  .tl-meal-pin .pin-time {
    font-size: 0.58rem;
    color: var(--text-dim);
    white-space: nowrap;
    text-align: center;
    margin-top: 1px;
  }

  .tl-bottom-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-top: 6px;
    padding: 0 2px;
  }

  .timeline-track-container {
    position: relative;
    padding-bottom: 54px;
    margin-bottom: 8px;
  }

  .free-time-bar {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }

  .time-chip {
    font-size: 0.78rem;
    padding: 5px 12px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
  }

  .chip-free  { background: rgba(106,255,204,0.12); color: var(--accent3); border: 1px solid rgba(106,255,204,0.25); }
  .chip-busy  { background: rgba(255,106,138,0.12); color: var(--accent2); border: 1px solid rgba(255,106,138,0.25); }
  .chip-meal  { background: rgba(124,106,255,0.12); color: var(--accent); border: 1px solid rgba(124,106,255,0.3); }
  .chip-snack { background: rgba(255,184,106,0.12); color: var(--warn); border: 1px solid rgba(255,184,106,0.25); }
  .chip-wake  { background: rgba(106,255,204,0.08); color: var(--accent3); border: 1px solid rgba(106,255,204,0.2); }
  .chip-sleep { background: rgba(124,106,255,0.08); color: var(--accent); border: 1px solid rgba(124,106,255,0.2); }

  .meal-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .meal-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .meal-card:hover { transform: translateY(-2px); }

  .meal-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }

  .meal-card.breakfast::after { background: var(--accent3); }
  .meal-card.lunch::after     { background: var(--accent); }
  .meal-card.dinner::after    { background: var(--accent2); }
  .meal-card.snack::after     { background: var(--warn); }

  .meal-name {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .meal-card.breakfast .meal-name { color: var(--accent3); }
  .meal-card.lunch     .meal-name { color: var(--accent); }
  .meal-card.dinner    .meal-name { color: var(--accent2); }
  .meal-card.snack     .meal-name { color: var(--warn); }

  .meal-time { font-size: 1.3rem; font-weight: 500; color: var(--text); margin-bottom: 8px; }
  .meal-cal  { font-size: 0.82rem; color: var(--text-dim); }
  .meal-cal strong { color: var(--text); font-size: 1rem; }

  .alert {
    background: rgba(255,184,106,0.08);
    border: 1px solid rgba(255,184,106,0.25);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.82rem;
    color: var(--warn);
    margin-top: 10px;
  }

  .divider { border: none; border-top: 1px solid var(--border); margin: 8px 0 16px; }

  .badge-snack {
    display: inline-block;
    background: rgba(255,184,106,0.2);
    color: var(--warn);
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
    font-family: 'DM Mono', monospace;
  }

  .error-msg { color: var(--accent2); font-size: 0.82rem; margin-top: 8px; display: none; }

  @media (max-width: 500px) {
    header h1 { font-size: 1.9rem; }
    .meal-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>NutriClock Pro</h1>
    <p>SCIENTIFIC MEAL TIMING · ADAPTIVE CALORIE DISTRIBUTION</p>
  </header>

  <!-- STEP 1: Wake Up Time -->
  <div class="step-card">
    <div class="step-label">Step 01</div>
    <div class="step-title">Wake Up Time</div>
    <div class="form-row">
      <div class="form-group">
        <label>Hour (1–12)</label>
        <input type="number" id="wakeH" min="1" max="12" value="7" placeholder="7">
      </div>
      <div class="form-group">
        <label>Minutes</label>
        <input type="number" id="wakeM" min="0" max="59" value="0" placeholder="0">
      </div>
      <div class="form-group">
        <label>AM / PM</label>
        <select id="wakePeriod">
          <option value="AM">AM</option>
          <option value="PM">PM</option>
        </select>
      </div>
    </div>
  </div>

  <!-- STEP 2: Busy Intervals -->
  <div class="step-card">
    <div class="step-label">Step 02</div>
    <div class="step-title">Busy Time Intervals</div>
    <div id="busyContainer"></div>
    <button class="btn btn-add" onclick="addBusy()">+ Add Busy Interval</button>
    <div class="error-msg" id="busyError">⚠ Check your busy intervals — times may overlap or be invalid.</div>
  </div>

  <!-- STEP 3: Sleep Time -->
  <div class="step-card">
    <div class="step-label">Step 03</div>
    <div class="step-title">Sleep Time</div>
    <div class="form-row">
      <div class="form-group">
        <label>Hour (1–12)</label>
        <input type="number" id="sleepH" min="1" max="12" value="10" placeholder="10">
      </div>
      <div class="form-group">
        <label>Minutes</label>
        <input type="number" id="sleepM" min="0" max="59" value="0" placeholder="0">
      </div>
      <div class="form-group">
        <label>AM / PM</label>
        <select id="sleepPeriod">
          <option value="AM">AM</option>
          <option value="PM" selected>PM</option>
        </select>
      </div>
    </div>
  </div>

  <!-- STEP 4: Daily Calories -->
  <div class="step-card">
    <div class="step-label">Step 04</div>
    <div class="step-title">Daily Calorie Goal</div>
    <div class="form-row">
      <div class="form-group">
        <label>Total Calories (kcal)</label>
        <input type="number" id="totalCal" min="800" max="5000" value="2000" placeholder="2000">
      </div>
    </div>
  </div>

  <button class="btn btn-primary" onclick="calculate()">⚡ Generate Scientific Meal Plan</button>

  <!-- RESULTS -->
  <div id="results">
    <div style="height:32px"></div>

    <!-- Free Time + Timeline -->
    <div class="result-section" id="res-freetime">
      <h3><span style="background:var(--accent3)"></span>Day Overview</h3>
      <div id="freeTimeDisplay"></div>
      <div class="timeline-wrapper">
        <div class="timeline-track-container">
          <div class="timeline-track" id="timelineTrack"></div>
          <div id="mealPins"></div>
        </div>
        <div class="tl-bottom-labels" id="tlLabels"></div>
      </div>
    </div>

    <!-- Snack Analysis -->
    <div class="result-section" id="res-snacks">
      <h3><span style="background:var(--warn)"></span>Snack Analysis</h3>
      <div id="snackAnalysis"></div>
    </div>

    <!-- Meal Schedule -->
    <div class="result-section" id="res-meals">
      <h3><span style="background:var(--accent)"></span>Meal Schedule</h3>
      <div class="meal-grid" id="mealGrid"></div>
    </div>

    <!-- Calorie Breakdown -->
    <div class="result-section" id="res-calories">
      <h3><span style="background:var(--accent2)"></span>Calorie Distribution</h3>
      <div id="calDisplay"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  HELPER FUNCTIONS
// ══════════════════════════════════════════════════════════════════

function toMinutes(h, m, period) {
  let hours = parseInt(h);
  const mins = parseInt(m);
  if (period === 'AM') {
    if (hours === 12) hours = 0;
  } else {
    if (hours !== 12) hours += 12;
  }
  return hours * 60 + mins;
}

function toTimeStr(totalMins) {
  totalMins = ((totalMins % 1440) + 1440) % 1440;
  const h24 = Math.floor(totalMins / 60);
  const m   = totalMins % 60;
  const period = h24 < 12 ? 'AM' : 'PM';
  let h12 = h24 % 12;
  if (h12 === 0) h12 = 12;
  return `${h12}:${String(m).padStart(2,'0')} ${period}`;
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// Vérifie si un temps est dans un intervalle libre
function isTimeInFreeIntervals(time, freeIntervals) {
  for (const [s, e] of freeIntervals) {
    if (time >= s && time < e) return true;
  }
  return false;
}

// ══════════════════════════════════════════════════════════════════
//  BUSY INTERVAL UI
// ══════════════════════════════════════════════════════════════════

let busyCount = 0;

function addBusy() {
  busyCount++;
  const id = busyCount;
  const div = document.createElement('div');
  div.className = 'busy-interval';
  div.id = `busy-${id}`;
  div.innerHTML = `
    <div class="form-group" style="min-width:70px">
      <label>From H</label>
      <input type="number" id="b${id}_h1" min="1" max="12" value="8" placeholder="8">
    </div>
    <div class="form-group" style="min-width:65px">
      <label>Min</label>
      <input type="number" id="b${id}_m1" min="0" max="59" value="0" placeholder="0">
    </div>
    <div class="form-group" style="min-width:72px">
      <label>Period</label>
      <select id="b${id}_p1">
        <option>AM</option><option>PM</option>
      </select>
    </div>
    <div class="time-sep">→</div>
    <div class="form-group" style="min-width:70px">
      <label>To H</label>
      <input type="number" id="b${id}_h2" min="1" max="12" value="9" placeholder="9">
    </div>
    <div class="form-group" style="min-width:65px">
      <label>Min</label>
      <input type="number" id="b${id}_m2" min="0" max="59" value="30" placeholder="30">
    </div>
    <div class="form-group" style="min-width:72px">
      <label>Period</label>
      <select id="b${id}_p2">
        <option>AM</option><option>PM</option>
      </select>
    </div>
    <button class="btn btn-remove" onclick="removeBusy(${id})">✕</button>
  `;
  document.getElementById('busyContainer').appendChild(div);
}

function removeBusy(id) {
  const el = document.getElementById(`busy-${id}`);
  if (el) el.remove();
}

// ══════════════════════════════════════════════════════════════════
//  CORE LOGIC AMÉLIORÉE
// ══════════════════════════════════════════════════════════════════

function getBusyIntervals(wakeMin, sleepMin) {
  const intervals = [];
  const items = document.getElementById('busyContainer').querySelectorAll('.busy-interval');
  for (const item of items) {
    const idStr = item.id.replace('busy-','');
    const s = toMinutes(
      document.getElementById(`b${idStr}_h1`).value,
      document.getElementById(`b${idStr}_m1`).value,
      document.getElementById(`b${idStr}_p1`).value
    );
    const e = toMinutes(
      document.getElementById(`b${idStr}_h2`).value,
      document.getElementById(`b${idStr}_m2`).value,
      document.getElementById(`b${idStr}_p2`).value
    );
    if (s >= e) return null;
    if (e <= wakeMin || s >= sleepMin) continue;
    intervals.push([Math.max(s, wakeMin), Math.min(e, sleepMin)]);
  }
  intervals.sort((a,b) => a[0] - b[0]);
  for (let i = 1; i < intervals.length; i++) {
    if (intervals[i][0] < intervals[i-1][1]) return null;
  }
  return intervals;
}

function getFreeIntervals(wakeMin, sleepMin, busyIntervals) {
  const free = [];
  let cursor = wakeMin;
  for (const [s, e] of busyIntervals) {
    if (cursor < s) free.push([cursor, s]);
    cursor = e;
  }
  if (cursor < sleepMin) free.push([cursor, sleepMin]);
  return free;
}

/**
 * NOUVELLE VERSION: Trouve le meilleur moment pour un repas
 * Garantit que le temps est dans un intervalle libre
 */
function findOptimalMealTime(ideal, freeIntervals, afterMin, beforeMin, minGapAfter, minGapBefore) {
  // Définir la fenêtre temporelle valide
  const windowStart = afterMin + minGapAfter;
  const windowEnd = beforeMin - minGapBefore;
  
  if (windowStart >= windowEnd) {
    console.warn("Fenêtre temporelle invalide pour le repas");
    return null;
  }

  // Filtrer les intervalles libres qui chevauchent la fenêtre valide
  const validWindows = [];
  for (const [s, e] of freeIntervals) {
    const overlapStart = Math.max(s, windowStart);
    const overlapEnd = Math.min(e, windowEnd);
    if (overlapEnd > overlapStart) {
      validWindows.push([overlapStart, overlapEnd]);
    }
  }

  if (validWindows.length === 0) {
    // FALLBACK: si aucune fenêtre n'est valide avec les contraintes, retourner le temps idéal
    return Math.round(ideal);
  }

  // Trouver le temps le plus proche de l'idéal dans les fenêtres valides
  let bestTime = null;
  let minDistance = Infinity;

  for (const [s, e] of validWindows) {
    // Vérifier si l'idéal est dans cette fenêtre
    if (ideal >= s && ideal < e) {
      return Math.round(ideal);
    }
    
    // Sinon, trouver le point le plus proche
    if (ideal < s) {
      const distance = s - ideal;
      if (distance < minDistance) {
        minDistance = distance;
        bestTime = Math.round(s);
      }
    } else if (ideal >= e) {
      const distance = ideal - (e - 1);
      if (distance < minDistance) {
        minDistance = distance;
        bestTime = Math.round(e - 1);
      }
    }
  }

  return bestTime;
}

/**
 * Calcule la distribution des calories basée sur:
 * - Le métabolisme de base (qui varie selon l'heure)
 * - L'activité prévue (repas avant/après des périodes chargées)
 * - Le temps jusqu'au prochain repas
 */
function calculateCalorieDistribution(meals, sleepMin, totalCal, busyIntervals) {

  // حدود منطقية لنسبة كل نوع وجبة
  const ranges = {
    breakfast: { min: 0.20, max: 0.35 },
    lunch:     { min: 0.30, max: 0.40 },
    dinner:    { min: 0.20, max: 0.30 },
    snack:     { min: 0.08, max: 0.15 }
  };

  // أوزان أولية حسب نوع الوجبة
  const baseWeights = {
    breakfast: 0.30,
    lunch: 0.38,
    dinner: 0.25,
    snack: 0.07
  };

  // حساب تأثير الفجوات والنشاط
  let scores = meals.map((meal, index) => {

    const nextTime =
      index < meals.length - 1
        ? meals[index + 1].time
        : sleepMin;

    const gap = nextTime - meal.time;

    let score = baseWeights[meal.type];

    // فجوة طويلة -> زيادة بسيطة فقط
    if (gap > 300) {
      score *= 1.15;
    }

    // قبل النوم لا نريد وجبة ضخمة
    if (meal.type === "dinner") {
      const untilSleep = sleepMin - meal.time;

      if (untilSleep < 180) {
        score *= 0.8;
      }
    }

    // وقت الشغل القادم
    let busyAfter = 0;

    for (const [s,e] of busyIntervals) {
      if (s > meal.time && s < nextTime) {
        busyAfter += e - s;
      }
    }

    // إذا في شغل طويل بعدها
    if (busyAfter > 240) {
      score *= 1.15;
    }

    return score;
  });


  // تحويل السكور إلى سعرات
  const totalScore = scores.reduce((a,b)=>a+b,0);

  let calories = meals.map((meal,i)=>{

    let cal = (scores[i] / totalScore) * totalCal;

    const range = ranges[meal.type];

    const min = totalCal * range.min;
    const max = totalCal * range.max;

    return Math.round(
      Math.min(max, Math.max(min, cal))
    );
  });


  // تعديل الفرق بعد وضع الحدود
  let diff =
    totalCal -
    calories.reduce((a,b)=>a+b,0);


  // توزيع الفرق على الوجبات التي لم تصل الحد الأعلى
  let safety = 0;

  while(diff !== 0 && safety < 100){

    for(let i=0;i<calories.length;i++){

      const type = meals[i].type;
      const max =
        totalCal * ranges[type].max;

      if(diff > 0 && calories[i] < max){
        calories[i] += 10;
        diff -= 10;
      }

      if(diff < 0 && calories[i] > 100){
        calories[i] -= 10;
        diff += 10;
      }

      if(diff === 0) break;
    }

    safety++;
  }


  return calories;
}

// ══════════════════════════════════════════════════════════════════
//  MAIN CALCULATE
// ══════════════════════════════════════════════════════════════════

function calculate() {
  const wakeMin = toMinutes(
    document.getElementById('wakeH').value,
    document.getElementById('wakeM').value,
    document.getElementById('wakePeriod').value
  );
  const sleepMin = toMinutes(
    document.getElementById('sleepH').value,
    document.getElementById('sleepM').value,
    document.getElementById('sleepPeriod').value
  );
  const totalCal = parseFloat(document.getElementById('totalCal').value) || 2000;

  if (sleepMin <= wakeMin) {
    alert('Sleep time must be after wake-up time (same day).');
    return;
  }

  const awakeSpan = sleepMin - wakeMin;
  if (awakeSpan < 4 * 60) {
    alert('Awake window is too short (less than 4 hours). Please adjust wake/sleep times.');
    return;
  }

  const busyIntervals = getBusyIntervals(wakeMin, sleepMin);
  if (busyIntervals === null) {
    document.getElementById('busyError').style.display = 'block';
    return;
  }
  document.getElementById('busyError').style.display = 'none';

  const freeIntervals = getFreeIntervals(wakeMin, sleepMin, busyIntervals);

  // ── PETIT-DÉJEUNER ─────────────────────────────────────────────
  // Idéal: 30-60 minutes après le réveil
  const breakfastIdeal = wakeMin + 45;
  const breakfastTime = findOptimalMealTime(
    breakfastIdeal,
    freeIntervals,
    wakeMin,        // Après le réveil
    sleepMin,       // Avant le sommeil
    30,             // Minimum 30 min après le réveil
    180             // Minimum 3h avant le sommeil
  );
  // Les conditions strictes ont été annulées pour le petit-déjeuner.
  // ── DÎNER ─────────────────────────────────────────────────────
  // Idéal: 2-3 heures avant le coucher
  const dinnerIdeal = sleepMin - 150;
  const dinnerTime = findOptimalMealTime(
    dinnerIdeal,
    freeIntervals,
    wakeMin,        // Après le réveil
    sleepMin,       // Avant le sommeil
    240,            // Minimum 4h après le réveil
    120             // Minimum 2h avant le sommeil
  );
  // Les conditions strictes ont été annulées pour le dîner.
  // ── DÉJEUNER ───────────────────────────────────────────────────
  // Idéal: à mi-chemin entre petit-déjeuner et dîner
  const lunchIdeal = Math.round((breakfastTime + dinnerTime) / 2);
  const lunchTime = findOptimalMealTime(
    lunchIdeal,
    freeIntervals,
    breakfastTime,  // Après le petit-déjeuner
    dinnerTime,     // Avant le dîner
    120,            // Minimum 2h après le petit-déjeuner
    120             // Minimum 2h avant le dîner
  );
  // Les conditions strictes ont été annulées pour le déjeuner.
  // ── ANALYSE DES COLLATIONS ────────────────────────────────────
  const gapBL = lunchTime - breakfastTime;
  const gapLD = dinnerTime - lunchTime;

  // Seuils scientifiques pour les collations
  const needSnack1 = gapBL > 5 * 60; // Plus de 5h entre petit-déj et déjeuner
  const needSnack2 = gapLD > 4.5 * 60; // Plus de 4h30 entre déjeuner et dîner

  let snack1Time = null;
  let snack2Time = null;

  if (needSnack1) {
    // Collation à mi-chemin entre petit-déjeuner et déjeuner
    const snack1Ideal = Math.round((breakfastTime + lunchTime) / 2);
    snack1Time = findOptimalMealTime(
      snack1Ideal,
      freeIntervals,
      breakfastTime,
      lunchTime,
      90,  // Minimum 1h30 après petit-déjeuner
      90   // Minimum 1h30 avant déjeuner
    );
  }

  if (needSnack2) {
    // Collation à mi-chemin entre déjeuner et dîner
    const snack2Ideal = Math.round((lunchTime + dinnerTime) / 2);
    snack2Time = findOptimalMealTime(
      snack2Ideal,
      freeIntervals,
      lunchTime,
      dinnerTime,
      90,  // Minimum 1h30 après déjeuner
      90   // Minimum 1h30 avant dîner
    );
  }

  // ── CONSTRUCTION DE LA LISTE DES REPAS ───────────────────────
  const meals = [];
  meals.push({ type: 'breakfast', time: breakfastTime });
  
  if (needSnack1 && snack1Time !== null) {
    meals.push({ type: 'snack', time: snack1Time });
  }
  
  meals.push({ type: 'lunch', time: lunchTime });
  
  if (needSnack2 && snack2Time !== null) {
    meals.push({ type: 'snack', time: snack2Time });
  }
  
  meals.push({ type: 'dinner', time: dinnerTime });

  // Tri par temps
  meals.sort((a, b) => a.time - b.time);

  // ── DISTRIBUTION DES CALORIES ─────────────────────────────────
  const calories = calculateCalorieDistribution(meals, sleepMin, totalCal, busyIntervals);
  meals.forEach((meal, index) => {
    meal.calories = calories[index];
  });

  // ── RENDU ─────────────────────────────────────────────────────
  renderResults(wakeMin, sleepMin, busyIntervals, freeIntervals, meals, needSnack1, needSnack2, gapBL, gapLD);
}

// ══════════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════════

function renderResults(wakeMin, sleepMin, busyIntervals, freeIntervals, meals, needSnack1, needSnack2, gapBL, gapLD) {
  const res = document.getElementById('results');
  res.style.display = 'block';
  setTimeout(() => res.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);

  const totalSpan = sleepMin - wakeMin;

  // ── Free Time chips ──────────────────────────────────────────
  const ftDiv = document.getElementById('freeTimeDisplay');
  let ftHtml = '<div class="free-time-bar">';
  ftHtml += `<span class="time-chip chip-wake">🌅 ${toTimeStr(wakeMin)}</span>`;

  const allChips = [];
  for (const [s, e] of freeIntervals)  allChips.push({ s, e, type: 'free' });
  for (const [s, e] of busyIntervals)  allChips.push({ s, e, type: 'busy' });
  allChips.sort((a, b) => a.s - b.s);

  for (const c of allChips) {
    if (c.type === 'free') {
      ftHtml += `<span class="time-chip chip-free">✓ ${toTimeStr(c.s)} – ${toTimeStr(c.e)}</span>`;
    } else {
      ftHtml += `<span class="time-chip chip-busy">⛔ ${toTimeStr(c.s)} – ${toTimeStr(c.e)}</span>`;
    }
  }
  ftHtml += `<span class="time-chip chip-sleep">🌙 ${toTimeStr(sleepMin)}</span>`;
  ftHtml += '</div>';
  ftDiv.innerHTML = ftHtml;

  // ── Timeline ──────────────────────────────────────────────────
  const track = document.getElementById('timelineTrack');
  track.innerHTML = '';
  document.getElementById('mealPins').innerHTML = '';

  // Draw free segments
  let trackHtml = '';
  for (const [s, e] of freeIntervals) {
    const left  = ((s - wakeMin) / totalSpan) * 100;
    const width = ((e - s)       / totalSpan) * 100;
    const dur   = e - s;
    const label = dur >= 30 ? `${Math.floor(dur/60)}h${dur%60 > 0 ? dur%60+'m' : ''}` : '';
    trackHtml += `<div class="tl-seg tl-seg-free" style="left:${left.toFixed(2)}%;width:${width.toFixed(2)}%" title="Free ${toTimeStr(s)} – ${toTimeStr(e)}">${label}</div>`;
  }

  // Draw busy segments
  for (const [s, e] of busyIntervals) {
    const left  = ((s - wakeMin) / totalSpan) * 100;
    const width = ((e - s)       / totalSpan) * 100;
    const dur   = e - s;
    const label = dur >= 30 ? `${Math.floor(dur/60)}h${dur%60 > 0 ? dur%60+'m' : ''}` : '';
    trackHtml += `<div class="tl-seg tl-seg-busy" style="left:${left.toFixed(2)}%;width:${width.toFixed(2)}%" title="Busy ${toTimeStr(s)} – ${toTimeStr(e)}">${label}</div>`;
  }
  track.innerHTML = trackHtml;

  // Draw meal pins
  const pinColors = {
    breakfast: { line: '#6affcc', dot: '#6affcc', label: 'var(--accent3)' },
    snack:     { line: '#ffb86a', dot: '#ffb86a', label: 'var(--warn)' },
    lunch:     { line: '#7c6aff', dot: '#7c6aff', label: 'var(--accent)' },
    dinner:    { line: '#ff6a8a', dot: '#ff6a8a', label: 'var(--accent2)' }
  };

  const pinsContainer = document.getElementById('mealPins');
  let snackPinIdx = 1;
  for (const m of meals) {
    // Vérifier que le repas est bien dans un intervalle libre
    const leftPct = ((m.time - wakeMin) / totalSpan) * 100;
    const c = pinColors[m.type];
    const label = m.type === 'snack'
      ? `Snack ${snackPinIdx++}`
      : m.type.charAt(0).toUpperCase() + m.type.slice(1);

    const pin = document.createElement('div');
    pin.className = 'tl-meal-pin';
    pin.style.left = `${leftPct.toFixed(2)}%`;
    pin.innerHTML = `
      <div class="pin-line" style="background:${c.line};opacity:0.7"></div>
      <div class="pin-dot"  style="background:${c.dot}"></div>
      <div class="pin-label" style="color:${c.label}">${label}</div>
      <div class="pin-time">${toTimeStr(m.time)}</div>
    `;
    pinsContainer.appendChild(pin);
  }

  document.getElementById('tlLabels').innerHTML =
    `<span>${toTimeStr(wakeMin)}</span><span>${toTimeStr(sleepMin)}</span>`;

  // ── Snack Analysis ─────────────────────────────────────────────
  const snackDiv = document.getElementById('snackAnalysis');
  const gapBLStr = `${Math.floor(gapBL/60)}h ${gapBL%60}m`;
  const gapLDStr = `${Math.floor(gapLD/60)}h ${gapLD%60}m`;
  
  snackDiv.innerHTML = `
    <div style="margin-bottom:10px; font-size:0.85rem; color:var(--text-dim)">
      Gap Breakfast → Lunch: <strong style="color:var(--text)">${gapBLStr}</strong>
      ${needSnack1
        ? '<span class="badge-snack">Snack recommended (&gt;5h)</span>'
        : '<span class="badge-snack" style="opacity:0.5">No snack needed (&lt;5h)</span>'}
    </div>
    <div style="font-size:0.85rem; color:var(--text-dim)">
      Gap Lunch → Dinner: <strong style="color:var(--text)">${gapLDStr}</strong>
      ${needSnack2
        ? '<span class="badge-snack">Snack recommended (&gt;4.5h)</span>'
        : '<span class="badge-snack" style="opacity:0.5">No snack needed (&lt;4.5h)</span>'}
    </div>
    ${!needSnack1 && !needSnack2
      ? '<div class="alert">✓ Your meal gaps are within ideal ranges — no snacks needed today.</div>'
      : ''}
  `;

  // ── Meal Grid ─────────────────────────────────────────────────
  const grid = document.getElementById('mealGrid');
  let gridHtml = '';
  let snackIdx = 1;
  for (const m of meals) {
    const typeClass = m.type;
    const label = m.type === 'snack'
      ? `Snack ${snackIdx++}`
      : m.type.charAt(0).toUpperCase() + m.type.slice(1);
    gridHtml += `
      <div class="meal-card ${typeClass}">
        <div class="meal-name">${label}</div>
        <div class="meal-time">${toTimeStr(m.time)}</div>
        <div class="meal-cal"><strong>${m.calories}</strong> kcal</div>
      </div>
    `;
  }
  grid.innerHTML = gridHtml;

  // ── Calorie Breakdown ─────────────────────────────────────────
  const calDiv = document.getElementById('calDisplay');
  const total = meals.reduce((a, m) => a + m.calories, 0);
  let calHtml = '';
  let si = 1;
  for (const m of meals) {
    const pct   = Math.round((m.calories / total) * 100);
    const label = m.type === 'snack'
      ? `Snack ${si++}`
      : m.type.charAt(0).toUpperCase() + m.type.slice(1);
    const color =
      m.type === 'breakfast' ? 'var(--accent3)' :
      m.type === 'lunch'     ? 'var(--accent)'  :
      m.type === 'dinner'    ? 'var(--accent2)'  :
                               'var(--warn)';
    calHtml += `
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:4px">
          <span style="color:${color}">${label} — ${toTimeStr(m.time)}</span>
          <span><strong>${m.calories}</strong> kcal <span style="color:var(--text-dim)">(${pct}%)</span></span>
        </div>
        <div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${color};border-radius:3px"></div>
        </div>
      </div>
    `;
  }
  calHtml += `<hr class="divider"><div style="text-align:right;font-size:0.82rem;color:var(--text-dim)">Total: <strong style="color:var(--text)">${total} kcal</strong></div>`;
  calDiv.innerHTML = calHtml;
}

// Initialize with one busy interval
addBusy();
</script>
