<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Measurements</title>

<style>
:root {
    --bg-color: #0b0c10;
    --card-bg: #12141c;
    --card-item-bg: #1a1d24;
    --card-border: #2c313c;
    --neon-green: #90ee02;
    --text-color: #ffffff;
    --gray-text: #8b8f9a;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
}

/* Custom Scrollbar */
::-webkit-scrollbar {
    width: 8px;
}
::-webkit-scrollbar-track {
    background: var(--bg-color);
}
::-webkit-scrollbar-thumb {
    background: var(--card-border);
    border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
    background: var(--neon-green);
}

body {
    background: var(--bg-color);
    color: var(--text-color);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
}

.page-container {
    width: 100%;
    max-width: 1200px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 20px 40px rgba(0,0,0,.6);
}

/* Progress Steps Bar */
.progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--gray-text);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
}

.progress-steps {
    display: flex;
    gap: 8px;
    margin-bottom: 40px;
}

.step-segment {
    flex: 1;
    height: 6px;
    background: var(--card-border);
    border-radius: 999px;
    transition: background 0.3s ease;
}

.step-segment.active {
    background: var(--neon-green);
    box-shadow: 0 0 8px rgba(144, 238, 2, 0.4);
}

/* Header */
.header-section {
    text-align: center;
    margin-bottom: 40px;
}

.header-section h1 {
    font-size: 36px;
    margin-bottom: 10px;
}

.header-section p {
    color: var(--gray-text);
    font-size: 18px;
}

/* Main Body Content Layout */
.measurement-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 100px; 
    height: 500px;
    margin-bottom: 40px;
    position: relative;
}

/* Form Controls Block Layout */
.inputs-sidebar {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 280px;
    position: relative;
    z-index: 10;
}

.input-card {
    background: var(--card-item-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 20px;
    transition: border-color 0.3s, transform 0.3s;
}

.input-card:focus-within {
    border-color: var(--neon-green);
    transform: translateY(-2px);
}

.input-card label {
    display: block;
    color: var(--gray-text);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.input-field-wrapper {
    display: flex;
    align-items: center;
    border-bottom: 2px solid var(--card-border);
    padding-bottom: 5px;
    transition: border-color 0.3s;
}

.input-card:focus-within .input-field-wrapper {
    border-color: var(--neon-green);
}

.input-field-wrapper input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text-color);
    font-size: 28px;
    font-weight: 700;
    outline: none;
    padding-right: 10px;
}

.input-field-wrapper input::-webkit-outer-spin-button,
.input-field-wrapper input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

.input-field-wrapper .unit-tag {
    color: var(--gray-text);
    font-size: 18px;
    font-weight: 600;
}

/* Central Male Model Frame */
.model-frame {
    height: 100%;
    width: 320px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    position: relative;
}

.model-frame img {
    height: 95%;
    object-fit: contain;
    opacity: 0.85;
}

/* Target Pointer Circles */
.pointer-node {
    position: absolute;
    width: 14px;
    height: 14px;
    background: var(--neon-green);
    border-radius: 50%;
    z-index: 5;
    box-shadow: 0 0 12px var(--neon-green);
}

.pointer-node::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border: 2px solid var(--neon-green);
    border-radius: 50%;
    left: -2px;
    top: -2px;
    animation: nodePulse 2s infinite ease-in-out;
}

@keyframes nodePulse {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
}

#node-neck {
    top: 22%; 
    left: 150px;
    transform: translateX(-50%);
}

#node-waist {
    top: 210px;
    left: 150px;
    transform: translateX(-50%);
}

#node-hip {
    top: 240px;
    left: 150px;
    transform: translateX(-50%);
}

/* Fixed Global Pointer Lines Positioned properly in body coordinates */
.pointer-line {
    position: absolute;
    height: 2px;
    background: linear-gradient(90deg, var(--neon-green), rgba(144, 238, 2, 0.1));
    z-index: 2;
    pointer-events: none;
    transform-origin: top left;
}

/* Action button area */
.action-button-container {
    max-width: 400px;
    margin: auto;
}

.confirm-btn {
    width: 100%;
    border: none;
    border-radius: 16px;
    padding: 18px;
    background: var(--neon-green);
    color: black;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
}

.confirm-btn:active {
    transform: scale(0.98);
}

/* Responsive Handling */
@media(max-width: 768px) {
    .measurement-wrapper {
        flex-direction: column-reverse;
        height: auto;
        gap: 30px;
    }
    .inputs-sidebar {
        width: 100%;
        gap: 20px;
    }
    .pointer-line {
        display: none;
    }
    .model-frame {
        height: 380px;
    }
    .header-section h1 {
        font-size: 28px;
    }
}
</style>
</head>
<body>

<div class="page-container">

    <!-- Progress Steps Header (5 vert / 100%) -->
    <div class="progress-header">
        <span>Step 5 of 5</span>
        <span>100%</span>
    </div>
    <div class="progress-steps">
        <div class="step-segment active"></div>
        <div class="step-segment active"></div>
        <div class="step-segment active"></div>
        <div class="step-segment active"></div>
        <div class="step-segment active"></div>
    </div>

    <div class="header-section">
        <h1>Body Measurements</h1>
        <p>Input your circumferences to ensure optimal target planning accuracy.</p>
    </div>

    <div class="measurement-wrapper" id="measurement-wrapper">
        
        <div class="inputs-sidebar">
            
            <div class="input-card" id="card-neck">
                <label for="input-neck">Neck Circumference</label>
                <div class="input-field-wrapper">
                    <input type="number" id="input-neck" placeholder="0.0" min="20" max="70" step="0.1" value="38.0">
                    <span class="unit-tag">cm</span>
                </div>
            </div>

            <div class="input-card" id="card-waist">
                <label for="input-waist">Waist Circumference</label>
                <div class="input-field-wrapper">
                    <input type="number" id="input-waist" placeholder="0.0" min="40" max="180" step="0.1" value="82.0">
                    <span class="unit-tag">cm</span>
                </div>
            </div>

            <div class="input-card" id="card-hip">
                <label for="input-hip">Hip Circumference</label>
                <div class="input-field-wrapper">
                    <input type="number" id="input-hip" placeholder="0.0" min="40" max="200" step="0.1" value="95.0">
                    <span class="unit-tag">cm</span>
                </div>
            </div>

        </div>

        <div class="model-frame" id="model-frame">
            <div class="pointer-node" id="node-neck"></div>
            <div class="pointer-node" id="node-waist"></div>
            <div class="pointer-node" id="node-hip"></div>

            <img src="" id="anatomy-model" alt="Body Model">
        </div>

        <div class="pointer-line" id="line-neck"></div>
        <div class="pointer-line" id="line-waist"></div>
        <div class="pointer-line" id="line-hip"></div>

    </div>

    <div class="action-button-container">
        <button class="confirm-btn" id="btn-submit">Continue</button>
    </div>

</div>

<script>
const userGender = localStorage.getItem('userGender') || 'male';
const modelImage = document.getElementById('anatomy-model');

if(userGender === 'female')
{
    modelImage.src = 'female.png';
}
else
{
    modelImage.src = 'male.png';
}

const hipCard = document.getElementById('card-hip');
const hipNode = document.getElementById('node-hip');
const hipLine = document.getElementById('line-hip');

if(userGender === 'male')
{
    hipCard.style.display = 'none';
    hipNode.style.display = 'none';
    hipLine.style.display = 'none';
}

function adjustPointerLines() {
    if (window.innerWidth <= 768) return; 

    const wrapperRect = document.getElementById('measurement-wrapper').getBoundingClientRect();
    
    // 1. Neck Line Fix
    const neckCard = document.getElementById('card-neck').getBoundingClientRect();
    const neckNode = document.getElementById('node-neck').getBoundingClientRect();
    const lineNeck = document.getElementById('line-neck');

    const neckX1 = neckCard.right - wrapperRect.left;
    const neckY1 = ((neckCard.top + neckCard.bottom) / 2) - wrapperRect.top;
    const neckX2 = ((neckNode.left + neckNode.right) / 2) - wrapperRect.left;
    const neckY2 = ((neckNode.top + neckNode.bottom) / 2) - wrapperRect.top;

    const distanceNeck = Math.hypot(neckX2 - neckX1, neckY2 - neckY1);
    const angleNeck = Math.atan2(neckY2 - neckY1, neckX2 - neckX1) * 180 / Math.PI;

    lineNeck.style.width = distanceNeck + 'px';
    lineNeck.style.left = neckX1 + 'px';
    lineNeck.style.top = neckY1 + 'px';
    lineNeck.style.transform = `rotate(${angleNeck}deg)`;

    // 2. Waist Line Fix
    const waistCard = document.getElementById('card-waist').getBoundingClientRect();
    const waistNode = document.getElementById('node-waist').getBoundingClientRect();
    const lineWaist = document.getElementById('line-waist');

    const waistX1 = waistCard.right - wrapperRect.left;
    const waistY1 = ((waistCard.top + waistCard.bottom) / 2) - wrapperRect.top;
    const waistX2 = ((waistNode.left + waistNode.right) / 2) - wrapperRect.left;
    const waistY2 = ((waistNode.top + waistNode.bottom) / 2) - wrapperRect.top;

    const distanceWaist = Math.hypot(waistX2 - waistX1, waistY2 - waistY1);
    const angleWaist = Math.atan2(waistY2 - waistY1, waistX2 - waistX1) * 180 / Math.PI;

    lineWaist.style.width = distanceWaist + 'px';
    lineWaist.style.left = waistX1 + 'px';
    lineWaist.style.top = waistY1 + 'px';
    lineWaist.style.transform = `rotate(${angleWaist}deg)`;

    // 3. Hip Line Fix (Only for Female)
    if(userGender === 'female')
    {
        const hipCardRect = document.getElementById('card-hip').getBoundingClientRect();
        const hipNodeRect = document.getElementById('node-hip').getBoundingClientRect();
        const lineHip = document.getElementById('line-hip');

        const hipX1 = hipCardRect.right - wrapperRect.left;
        const hipY1 = ((hipCardRect.top + hipCardRect.bottom) / 2) - wrapperRect.top;
        const hipX2 = ((hipNodeRect.left + hipNodeRect.right) / 2) - wrapperRect.left;
        const hipY2 = ((hipNodeRect.top + hipNodeRect.bottom) / 2) - wrapperRect.top;

        const distanceHip = Math.hypot(hipX2 - hipX1, hipY2 - hipY1);
        const angleHip = Math.atan2(hipY2 - hipY1, hipX2 - hipX1) * 180 / Math.PI;

        lineHip.style.width = distanceHip + 'px';
        lineHip.style.left = hipX1 + 'px';
        lineHip.style.top = hipY1 + 'px';
        lineHip.style.transform = `rotate(${angleHip}deg)`;
    }
}

window.addEventListener('load', () => {
    setTimeout(adjustPointerLines, 250);
});
window.addEventListener('resize', adjustPointerLines);

// Submit route redirection
document.getElementById('btn-submit').addEventListener('click', () => {
    const neckValue = document.getElementById('input-neck').value;
    const waistValue = document.getElementById('input-waist').value;

    localStorage.setItem('userNeckCirc', neckValue);
    localStorage.setItem('userWaistCirc', waistValue);

    if(userGender === 'female')
    {
        const hipValue = document.getElementById('input-hip').value;
        localStorage.setItem('userHipCirc', hipValue);
    }

    window.location.href = 'result.html';
});
</script>

</body>
</html>
