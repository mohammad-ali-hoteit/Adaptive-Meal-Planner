<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Onboarding - Âge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0b0c10;
      --card-bg: #161a23;
      --card-item-bg: #1d232e;
      --card-border: #2d3545;
      --neon-green: #8cf500;
      --text-color: #ffffff;
      --gray-text: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      user-select: none;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background-color: var(--card-bg);
      border-radius: 24px;
      padding: 40px;
      max-width: 850px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      border: 1px solid #232936;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* --- PROGRESS BAR --- */
    .steps-container {
      display: flex;
      gap: 10px;
      width: 100%;
      margin-bottom: 35px;
    }

    .step {
      flex: 1;
      height: 6px;
      background-color: #232936;
      border-radius: 10px;
    }

    .step.active {
      background-color: var(--neon-green);
      box-shadow: 0 0 10px rgba(140, 245, 0, 0.5);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 8px;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .header p {
      color: var(--gray-text);
      font-size: 0.95rem;
    }

    .age-cards-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      width: 100%;
      margin-bottom: 35px;
    }

    .age-card {
      background-color: var(--card-item-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 16px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .age-card:hover {
      border-color: var(--neon-green);
    }

    .age-card .card-title {
      font-size: 0.75rem;
      color: var(--gray-text);
      margin-bottom: 6px;
      font-weight: 500;
      white-space: nowrap;
    }

    .age-card .card-range {
      font-size: 1.1rem;
      font-weight: 700;
      color: #ffffff;
    }

    .age-card.active {
      background-color: var(--neon-green);
      border-color: var(--neon-green);
      box-shadow: 0 0 15px rgba(140, 245, 0, 0.4);
    }

    .age-card.active .card-title,
    .age-card.active .card-range {
      color: #000000;
    }

    .counter-box {
      background-color: var(--card-item-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 280px;
      margin-bottom: 35px;
    }

    .counter-display {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .counter-number {
      font-size: 3.2rem;
      font-weight: 800;
      color: #ffffff;
      line-height: 1;
    }

    .counter-label {
      color: #64748b;
      font-size: 1.1rem;
      font-weight: 500;
    }

    .counter-controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn-arrow {
      background-color: #28303f;
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .btn-arrow:hover {
      background-color: #343e52;
    }

    .btn-arrow svg {
      width: 14px;
      height: 14px;
      fill: var(--neon-green);
    }

    .btn-continue {
      background-color: var(--neon-green);
      color: #000000;
      border: none;
      border-radius: 12px;
      padding: 16px;
      width: 320px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(140, 245, 0, 0.25);
      transition: transform 0.1s ease, background-color 0.2s ease;
    }

    .btn-continue:hover {
      background-color: #7be000;
    }

    .btn-continue:active {
      transform: scale(0.98);
    }

    @media (max-width: 768px) {
      .age-cards-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 480px) {
      .age-cards-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .container {
        padding: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="steps-container">
      <div class="step active"></div>
      <div class="step"></div>
      <div class="step"></div>
      <div class="step"></div>
      <div class="step"></div>
    </div>

    <div class="header">
      <h1>How old are you?</h1>
      <p>Your age helps us fine-tune your caloric limits.</p>
    </div>

    <div class="age-cards-grid">
      <div class="age-card" data-min="18" data-max="24">
        <div class="card-title">Young Adults</div>
        <div class="card-range">18–24</div>
      </div>
      <div class="age-card" data-min="25" data-max="34">
        <div class="card-title">Early Adults</div>
        <div class="card-range">25–34</div>
      </div>
      <div class="age-card" data-min="35" data-max="44">
        <div class="card-title">Adults</div>
        <div class="card-range">35–44</div>
      </div>
      <div class="age-card" data-min="45" data-max="54">
        <div class="card-title">Middle-Aged</div>
        <div class="card-range">45–54</div>
      </div>
      <div class="age-card" data-min="55" data-max="64">
        <div class="card-title">Older Adults</div>
        <div class="card-range">55–64</div>
      </div>
      <div class="age-card" data-min="65" data-max="80">
        <div class="card-title">Seniors</div>
        <div class="card-range">65+</div>
      </div>
    </div>

    <div class="counter-box">
      <div class="counter-display">
        <span class="counter-number" id="ageDisplay">21</span>
        <span class="counter-label">years old</span>
      </div>
      <div class="counter-controls">
        <button class="btn-arrow" id="btnUp" aria-label="Increase age">
          <svg viewBox="0 0 24 24"><path d="M12 8l-6 6h12z"/></svg>
        </button>
        <button class="btn-arrow" id="btnDown" aria-label="Decrease age">
          <svg viewBox="0 0 24 24"><path d="M12 16l6-6H6z"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-continue" id="btnContinuePage1">Continue</button>
  </div>

  <script>
    let currentAge = parseInt(localStorage.getItem('userAge')) || 21;
    const MIN_AGE = 18;
    const MAX_AGE = 80;

    const ageDisplay = document.getElementById('ageDisplay');
    const btnUp = document.getElementById('btnUp');
    const btnDown = document.getElementById('btnDown');
    const ageCards = document.querySelectorAll('.age-card');

    function updateAge(newAge) {
      if (newAge < MIN_AGE || newAge > MAX_AGE) return;
      
      currentAge = newAge;
      ageDisplay.textContent = currentAge;

      ageCards.forEach(card => {
        const min = parseInt(card.dataset.min);
        const max = parseInt(card.dataset.max);

        if (currentAge >= min && currentAge <= max) {
          card.classList.add('active');
        } else {
          card.classList.remove('active');
        }
      });
    }

    btnUp.addEventListener('click', () => updateAge(currentAge + 1));
    btnDown.addEventListener('click', () => updateAge(currentAge - 1));

    ageCards.forEach(card => {
      card.addEventListener('click', () => {
        const min = parseInt(card.dataset.min);
        updateAge(min);
      });
    });

    document.getElementById('btnContinuePage1').addEventListener('click', () => {
      localStorage.setItem('userAge', currentAge);
      window.location.href = 'gender.html';
    });

    updateAge(currentAge);
  </script>
</body>
</html>
